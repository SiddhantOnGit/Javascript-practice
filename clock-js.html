
<html>
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        .time-container{
            display: block;
            margin:10% auto;
            width: 500px;
            height: 500px;
            padding:0px;
            box-sizing: border-box;
            color: #fff;
            border-radius: 50%;
            background-image: linear-gradient(to right,#00d4ff,#073697);
            text-align: center;
            animation-name: rotate;
            animation-duration: 1s;
            animation-iteration-count: single;
            animation-timing-function:linear;
            transition: 1.5s;
        }
        .time-container:hover{
            transform: rotate(360deg);
        }
    
        #clock{
            display: inline-block;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.7);
            font-size: 50px;
            font-family: fantasy;
            padding: 10px;
            box-sizing: border-box;
            margin-top: 200px;
            border-radius: 20px;
            background-image: linear-gradient(45deg,gray 10%,black);
            letter-spacing:10px;
        }
        body{
            background: #000;
            margin: 0;
            padding: 0;
        }
        

        @keyframes rotate {
            from{
                transform: rotateZ(0);
            }
            to {
                transform: rotateZ(360deg);
            }
        }
    
    
    </style>
</head>
<script src="clock.js"></script>
<body>
   <div class="time-container" id="myT">
      <div id="clock">Time</div>
   </div>
    
</body>
</html>
