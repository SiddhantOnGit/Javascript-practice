<html lang="en">
<head>

</head>
<body class="bg-dark">

   
   <lottie-player id="myLottie" src="https://lottie.host/1e149780-39dd-4633-a66e-cd8af5cf404f/L3f6nLO6ey.json" background="transparent" speed="1" style="width: 300px; margin: auto" direction="1" mode="normal" ></lottie-player>

       <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
    <script>
        let player = document.getElementById('myLottie');
        player.onclick = function (){
            player.stop();
            player.play();
        }
